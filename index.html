<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RailTrack Pro Dashboard</title>

<style>
:root {
  --bg: #0f172a;
  --card: #020617;
  --text: #e2e8f0;
  --sub: #94a3b8;
  --accent: #38bdf8;
}

body.light {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #0f172a;
  --sub: #475569;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: var(--card);
  padding: 20px;
  height: 100vh;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  margin-bottom: 10px;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: var(--accent);
  cursor: pointer;
}

.result {
  margin-top: 10px;
  font-size: 13px;
  color: var(--sub);
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>RailTrack</h2>
  <button onclick="toggleTheme()">🌗 Theme</button>
  <button onclick="clearData()">🧹 Clear</button>
</div>

<div class="main">

<div class="topbar">
  <h2>Dashboard</h2>
  <div id="userDisplay">Guest</div>
</div>

<div class="grid">

<!-- Train -->
<div class="card">
<h3>🚆 Train Tracker</h3>
<input id="trainNo" placeholder="Train Number">
<button onclick="trackTrain()">Track</button>
<div id="trainResult" class="result"></div>
</div>

<!-- Parcel -->
<div class="card">
<h3>📦 Parcel</h3>
<input id="parcelNo" placeholder="Parcel ID">
<button onclick="trackParcel()">Track</button>
<div id="parcelResult" class="result"></div>
</div>

<!-- Seats -->
<div class="card">
<h3>💺 Seats</h3>
<input id="seatTrain" placeholder="Train">
<input id="from" list="stationsList" placeholder="From (type or select)">
<input id="to" list="stationsList" placeholder="To (type or select)">
<datalist id="stationsList">
  <option value="New Delhi">
  <option value="Mumbai">
  <option value="Chennai">
  <option value="Kolkata">
  <option value="Bengaluru">
  <option value="Hyderabad">
  <option value="Ahmedabad">
  <option value="Pune">
  <option value="Jaipur">
  <option value="Lucknow">
  <option value="Kanpur">
  <option value="Nagpur">
  <option value="Bhopal">
  <option value="Indore">
  <option value="Patna">
  <option value="Ranchi">
  <option value="Bhubaneswar">
  <option value="Visakhapatnam">
  <option value="Vijayawada">
  <option value="Kochi">
  <option value="Thiruvananthapuram">
  <option value="Kozhikode">
  <option value="Coimbatore">
  <option value="Madurai">
  <option value="Surat">
  <option value="Vadodara">
  <option value="Rajkot">
  <option value="Chandigarh">
  <option value="Amritsar">
  <option value="Ludhiana">
  <option value="Dehradun">
  <option value="Haridwar">
  <option value="Varanasi">
  <option value="Prayagraj">
  <option value="Guwahati">
  <option value="Shillong">
  <option value="Agartala">
  <option value="Imphal">
  <option value="Aizawl">
  <option value="Itanagar">
  <option value="Port Blair">
</datalist>
<button onclick="checkSeats()">Check</button>
<div id="seatResult" class="result"></div>
</div>

<!-- Login -->
<div class="card">
<h3>🔐 Login</h3>
<input id="user" placeholder="Username">
<button onclick="login()">Login</button>
<div id="authResult" class="result"></div>
</div>

<!-- History -->
<div class="card">
<h3>📜 Search History</h3>
<div id="history" class="result"></div>
</div>

<!-- Notifications -->
<div class="card">
<h3>🔔 Alerts</h3>
<button onclick="notify()">Test Alert</button>
<div id="alertBox" class="result"></div>
</div>

</div>
</div>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");
}

function saveHistory(item) {
  let hist = JSON.parse(localStorage.getItem("hist") || "[]");
  hist.push(item);
  localStorage.setItem("hist", JSON.stringify(hist));
  renderHistory();
}

function renderHistory() {
  let hist = JSON.parse(localStorage.getItem("hist") || "[]");
  document.getElementById("history").innerHTML = hist.join("<br>");
}

function trackTrain() {
  let t = document.getElementById("trainNo").value;
  let r = document.getElementById("trainResult");

  r.innerHTML = "Loading...";
  saveHistory("Train " + t);

  setTimeout(()=>{
    r.innerHTML = `Name: Express ${t}<br>From: Delhi<br>To: Mumbai<br>Current: Station X`;
  },800);
}

function trackParcel() {
  let p = document.getElementById("parcelNo").value;
  let r = document.getElementById("parcelResult");

  r.innerHTML = "Loading...";
  saveHistory("Parcel " + p);

  setTimeout(()=>{
    r.innerHTML = `Parcel ${p}<br>Status: Moving<br>Location: Hub`;
  },800);
}

function checkSeats() {
  let r = document.getElementById("seatResult");
  r.innerHTML = "Checking...";
  saveHistory("Seat check");

  setTimeout(()=>{
    r.innerHTML = "Available: 25";
  },800);
}

function login() {
  let user = document.getElementById("user").value;
  localStorage.setItem("user", user);
  document.getElementById("userDisplay").innerText = user;
}

function notify() {
  document.getElementById("alertBox").innerHTML = "Train delayed by 10 mins";
}

function clearData() {
  localStorage.clear();
  location.reload();
}

renderHistory();
</script>

</body>
</html>
