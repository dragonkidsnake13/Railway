<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RailTrack Pro</title>

<style>
:root {
    --bg: #0f172a;
    --card: #020617;
    --text: #e2e8f0;
    --sub: #94a3b8;
}

body.light {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --sub: #475569;
}

body {
    margin: 0;
    font-family: sans-serif;
    background: var(--bg);
    color: var(--text);
}

header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: var(--card);
}

button {
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: var(--card);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

.result {
    margin-top: 10px;
    font-size: 14px;
    color: var(--sub);
}
</style>
</head>

<body>

<header>
    <h2>RailTrack Pro</h2>
    <div>
        <button onclick="toggleTheme()">Toggle Theme</button>
    </div>
</header>

<div class="container">

<div class="card">
<h3>🚆 Train Tracking</h3>
<input id="trainNo" placeholder="Train Number">
<button onclick="trackTrain()">Track</button>
<div id="trainResult" class="result"></div>
</div>

<div class="card">
<h3>📦 Parcel Tracking</h3>
<input id="parcelNo" placeholder="Parcel ID">
<button onclick="trackParcel()">Track</button>
<div id="parcelResult" class="result"></div>
</div>

<div class="card">
<h3>💺 Seat Availability</h3>
<input id="seatTrain" placeholder="Train Number">
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<button onclick="checkSeats()">Check</button>
<div id="seatResult" class="result"></div>
</div>

<div class="card">
<h3>🔐 Login / Signup</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div id="authResult" class="result"></div>
</div>

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("light");
}

function trackTrain() {
    let t = document.getElementById("trainNo").value;
    let r = document.getElementById("trainResult");

    r.innerHTML = "Loading...";

    setTimeout(()=>{
        r.innerHTML = `
        Name: Express ${t}<br>
        From: Delhi<br>
        To: Mumbai<br>
        Current: Somewhere Station<br>
        Status: On Time
        `;
    },1000);
}

function trackParcel() {
    let p = document.getElementById("parcelNo").value;
    let r = document.getElementById("parcelResult");

    r.innerHTML = "Loading...";

    setTimeout(()=>{
        r.innerHTML = `
        Parcel: ${p}<br>
        Status: In Transit<br>
        Location: Hub Center
        `;
    },1000);
}

function checkSeats() {
    let r = document.getElementById("seatResult");
    r.innerHTML = "Checking...";

    setTimeout(()=>{
        r.innerHTML = "Seats Available: 32";
    },1000);
}

function login() {
    let user = document.getElementById("user").value;
    let r = document.getElementById("authResult");

    if(user === "") {
        r.innerHTML = "Enter username";
        return;
    }

    localStorage.setItem("user", user);
    r.innerHTML = "Logged in as " + user;
}
</script>

</body>
</html>
